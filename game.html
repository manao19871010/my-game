            content: '';

            height: 6px;
            background: #00f5a0;
            border-radius: 50%;

        }

        /* Mobile menu button - Hidden by default */

            display: none;
            background: transparent;
            border: none;
            color: #e8e8f0;
            font-size: 1.2rem;

        }

        /* Green dot breathing animation */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* Game loading layer */
        .game-loader {

            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            z-index: 10;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .game-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Neon rotating ring */
        .loader-ring {
            width: 64px;
            height: 64px;
            border: 4px solid transparent;
            border-top: 4px solid #00f5a0;
            border-right: 4px solid #00d9f5;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            filter: drop-shadow(0 0 8px #00f5a0) drop-shadow(0 0 16px rgba(0, 245, 160, 0.4));
        }

        .loader-ring::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 3px solid transparent;
            border-bottom: 3px solid #00d9f5;
            border-left: 3px solid #00f5a0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        /* Loading text */
        .loader-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            color: #00f5a0;
            text-transform: uppercase;
            animation: textPulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(0, 245, 160, 0.6));
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes textPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>

    <script>
        var basePaddingTop = 56.25; // Default 16:9 ratio
        var currentSizeOffset = 0;

        function resizeGame(step) {
            currentSizeOffset = Math.max(-15, Math.min(20, currentSizeOffset + step));
            var container = document.querySelector('.iframe-container');
            container.style.paddingTop = (basePaddingTop + currentSizeOffset) + '%';

            var label = 'Standard';
            if (currentSizeOffset > 0) label = 'Zoom In ' + currentSizeOffset + '%';
            if (currentSizeOffset < 0) label = 'Zoom Out ' + Math.abs(currentSizeOffset) + '%';
            document.getElementById('sizeValue').textContent = label;
        }

        function resetSize() {
            currentSizeOffset = 0;
            var container = document.querySelector('.iframe-container');
            container.style.paddingTop = basePaddingTop + '%';
            document.getElementById('sizeValue').textContent = 'Standard';
        }

       // Fullscreen function
function goFullScreen() {
    var container = document.querySelector('.iframe-container');
    if (!container) return;
    if (container.requestFullscreen) {
        container.requestFullscreen();
    } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
    } else if (container.mozRequestFullScreen) {
        container.mozRequestFullScreen();
    }
}

// Shuffle array randomly
function shuffleArray(array) {
    var arr = array.slice();
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
    }
    return arr;
}

// Generate clean game slug (only keep name, no path prefix)
function getCleanSlug(gameName) {
    return gameName.toLowerCase().replace(/_/g, '-');
}

// Generate game jump link (auto adapt to local/online)
function getGameUrl(gameName) {
    var slug = getCleanSlug(gameName);
    var isLocal = window.location.hostname === '127.0.0.1'
        || window.location.hostname === 'localhost'
        || window.location.protocol === 'file:';
    return isLocal ? `game.html?slug=${slug}` : `/games/${slug}/`;
}

// Parse clean slug from URL (auto clean prefix, slashes)
function getGameSlug() {
    // First try to parse from path (online pseudo-static)
    var pathParts = window.location.pathname.split('/').filter(Boolean);
    var gamesIndex = pathParts.indexOf('games');
    if (gamesIndex > -1 && pathParts[gamesIndex + 1]) {
        return pathParts[gamesIndex + 1].toLowerCase();
    }
    // Then parse from query parameters (local)
    var params = new URLSearchParams(window.location.search);
    var slugParam = params.get('slug');
    if (slugParam) {
        // Clean up possible /games/ prefix and leading/trailing slashes
        return slugParam.replace(/^\/?games\//, '').replace(/\/$/, '').toLowerCase();
    }
    return '';
}

// Render left trending game list
function renderLeftGames(currentKey) {
    var list = document.getElementById('leftGameList');
    if (!list || typeof games === 'undefined') return;

    var filtered = games.filter(function (g) { return g[0] !== currentKey; });
    var shuffled = shuffleArray(filtered);
    var showList = shuffled.slice(0, 10);

    var html = "";
    showList.forEach(function (item) {
        var name = item[0].replace(/_/g, ' ');
        html += `
            <a href="${getGameUrl(item[0])}" class="left-game-item">
                <img src="${item[4]}" alt="${name}">
                <span>${name}</span>
            </a>
        `;
    });
    list.innerHTML = html;
}

// Render right recommended games
function generateSidebar(currentKey) {
    var grid = document.getElementById('recommendationGrid');
    if (!grid || typeof games === 'undefined') return;

    var filtered = games.filter(function (g) { return g[0] !== currentKey; });
    var html = "";
    filtered.slice(0, 6).forEach(function (item) {
        var name = item[0].replace(/_/g, ' ');
        html += `
            <a href="${getGameUrl(item[0])}" class="rec-card">
                <img src="${item[4]}" alt="${name}">
                <div class="rec-name">${name}</div>
            </a>
        `;
    });
    grid.innerHTML = html;
}

// Render more games
function renderMoreGames(currentKey) {
    var grid = document.getElementById('moreGamesGrid');
    if (!grid || typeof games === 'undefined') return;

    var filtered = games.filter(function (g) { return g[0] !== currentKey; });
    var showList = filtered.slice(4, 8);

    var html = "";
    showList.forEach(function (item) {
        var name = item[0].replace(/_/g, ' ');
        html += `
            <a href="${getGameUrl(item[0])}" class="more-game-card">
                <img src="${item[4]}" alt="${name}">
                <div class="more-name">${name}</div>
            </a>
        `;
    });
    grid.innerHTML = html;
}

// Page initialization
document.addEventListener('DOMContentLoaded', function () {
    if (typeof gameDetails === 'undefined' || typeof games === 'undefined') {
        console.error("games.js loading failed");
        document.getElementById('gameLoader').classList.add('hidden');
        return;
    }

    var slugFromUrl = getGameSlug();
    console.log("Final parsed game slug:", slugFromUrl);

    // Match game
    var matchedKey = Object.keys(gameDetails).find(function (key) {
        return key.toLowerCase().replace(/_/g, '-') === slugFromUrl;
    });

    if (matchedKey) {
        var details = gameDetails[matchedKey];
        var gameName = matchedKey.replace(/_/g, ' ');

        // Update page information
        document.title = gameName + " - Play on Vortexly";
        document.getElementById('gameTitle').textContent = gameName;
        document.getElementById('gameDesc').textContent = details.desc;
        document.getElementById('gameRating').textContent = "⭐ " + (details.rating || "4.5");

        // Load game iframe
        var iframe = document.getElementById('gameIframe');
        var referrerUrl = encodeURIComponent(window.location.href);
        iframe.src = "https://html5.gamedistribution.com/" + details.gameId + "/?gd_sdk_referrer_url=" + referrerUrl;

        // Hide animation after loading
        iframe.onload = function() {
            setTimeout(function() {
                document.getElementById('gameLoader').classList.add('hidden');
            }, 300);
        };

        // Update top game count
        document.getElementById('liveCountBadge').textContent =  " Games";

        // Render all sidebars
        renderLeftGames(matchedKey);
        generateSidebar(matchedKey);
        renderMoreGames(matchedKey);
    } else {
        document.getElementById('gameTitle').textContent = "Game Not Found";
        document.getElementById('gameLoader').classList.add('hidden');
        console.warn("Game not matched");
    }
});

    </script>
