<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    
    <title id="pageTitle">Free Online Games - Vortexly</title>
    <meta name="description" id="pageDesc" content="Play free online games on Vortexly. No download, no sign-up required.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" id="canonicalTag" href="https://vortex-ly.com/">

  
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vortexly">
    <meta id="ogTitle"    property="og:title"       content="Play Free Games - Vortexly">
    <meta id="ogDesc"     property="og:description" content="Play free online games on Vortexly">
    <meta id="ogUrl"      property="og:url"         content="https://vortex-ly.com/">
    <meta id="ogImage"    property="og:image"       content="https://vortex-ly.com/og-default.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <script type="application/ld+json" id="schemaScript">{}</script>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    
    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #12121a;
            --card:      #1a1a26;
            --border:    #2a2a3e;
            --neon:      #00f5a0;
            --neon2:     #00d9f5;
            --hot:       #ff3d71;
            --gold:      #ffd166;
            --text:      #e8e8f0;
            --muted:     #7070a0;
            --font-head: 'Bebas Neue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
        }
        header {
            background: rgba(10,10,15,0.88);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--neon), var(--neon2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0a0f;
        }
        .logo-text {
            font-family: var(--font-head);
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--text);
        }
        .logo-text span { color: var(--neon); }
        
        .game-detail {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 2rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
        }
        .game-main { width: 100%; }
        .game-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .game-info-left h1 {
            font-family: var(--font-head);
            font-size: 2.2rem;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .game-meta {
            display: flex;
            gap: 16px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .game-rating { color: var(--gold); font-weight: 600; }
        
        .game-frame-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        #gameIframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        .game-desc-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
        }
        .game-desc-box h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        .game-desc-box p {
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .game-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 80px;
            height: fit-content;
        }
        .ad-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }
        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 32px 2rem;
            margin-top: 60px;
        }
        .footer-bottom {
            max-width: 1400px;
            margin: 0 auto;
            font-size: 0.78rem;
            color: var(--muted);
        }
        @media (max-width: 1024px) {
            .game-detail { grid-template-columns: 1fr; }
            .game-sidebar { position: static; }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-inner">
            <a href="/" class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <span class="logo-text">VORTE<span>XLY</span></span>
            </a>
        </div>
    </header>

    <main class="game-detail">
        <div class="game-main">
            <div class="game-info-bar">
                <div class="game-info-left">
                    <h1 id="gameTitle">Loading...</h1>
                    <div class="game-meta">
                        <span id="gameGenre">Genre</span>
                        <span class="game-rating" id="gameRating">⭐ 4.5</span>
                    </div>
                </div>
            </div>
            <div class="game-frame-wrapper">
                <iframe id="gameIframe" src="" frameborder="0" scrolling="no" allowfullscreen></iframe>
            </div>
            <div class="game-desc-box">
                <h3>About This Game</h3>
                <p id="gameDesc">Loading game description...</p>
            </div>
        </div>
        <aside class="game-sidebar">
            <div class="ad-card">Advertisement Slot</div>
        </aside>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Vortexly. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/games.js"></script>
    <script>
        console.log(
  'PATH:', location.pathname,
  'SEARCH:', location.search,
  'slug param:', new URLSearchParams(location.search).get('slug')
);
        document.addEventListener('DOMContentLoaded', () => {
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            let slug = null;
            
          
            if (pathParts[0] === 'games' && pathParts[1]) {
                slug = pathParts[1].replace(/\/$/, '');
            } else {
                slug = (new URLSearchParams(window.location.search).get('slug') || '').replace(/\/$/, '');
            }

            const game = games.find(item => {
                const gameSlug = item[0].toLowerCase().replace(/ /g, '-').replace(/_/g, '-');
                return gameSlug === slug;
            });

            if (!game) {
                window.location.replace('/');
                return;
            }

            const gameName = game[0].replace(/_/g, ' ');
            const details = gameDetails[game[0]] || { desc: "", rating: "4.5" };
            const gdId = game[12];
            //const gdUrl = `https://html5.gamedistribution.com/${gdId}/?gd_sdk_referrer_url=https://vortex-ly.com`;
            const gdUrl = `https://html5.gamedistribution.com/${gdId}/?gd_sdk_referrer_url=https://my-game-site.pages.dev`;

            document.getElementById('pageTitle').textContent = `${gameName} - Play on Vortexly`;
            document.getElementById('pageDesc').setAttribute('content', details.desc);
            document.getElementById('canonicalTag').setAttribute('href', `https://vortex-ly.com/games/${slug}/`);
            document.getElementById('gameTitle').textContent = gameName;
            document.getElementById('gameGenre').textContent = game[6].split(' ')[0];
            document.getElementById('gameRating').textContent = `⭐ ${details.rating}`;
            document.getElementById('gameDesc').textContent = details.desc;
            document.getElementById('gameIframe').src = gdUrl;
        });
    </script>
</body>
</html>
