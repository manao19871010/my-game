<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Vortexly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #12121a;
            --card:      #1a1a26;
            --border:    #2a2a3e;
            --neon:      #00f5a0;
            --neon2:     #00d9f5;
            --text:      #e8e8f0;
            --muted:     #7070a0;
            --font-head: 'Bebas Neue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; line-height: 1.6; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.25; z-index: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1400px; margin: 0 auto; padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--neon), var(--neon2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #0a0a0f; font-size: 18px; }
        .logo-text { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: 2px; color: var(--text); }
        .logo-text span { color: var(--neon); }
        nav { display: flex; gap: 4px; }
        nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
        nav a:hover, nav a.active { color: var(--neon); background: rgba(0,245,160,0.08); }
        
        .container { max-width: 600px; margin: 60px auto; padding: 0 2rem; position: relative; z-index: 1; }
        h1 { font-family: var(--font-head); font-size: 3.5rem; letter-spacing: 2px; margin-bottom: 10px; color: var(--text); text-align: center; }
        h1 span { background: linear-gradient(90deg, var(--neon), var(--neon2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--muted); text-align: center; margin-bottom: 40px; }
        
        .contact-method { display: flex; align-items: center; gap: 15px; background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .contact-icon { width: 48px; height: 48px; background: rgba(0,245,160,0.1); color: var(--neon); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .contact-details h4 { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
        .contact-details p { color: var(--muted); font-size: 0.95rem; }
        .contact-details a { color: var(--neon); text-decoration: none; }
        .contact-details a:hover { text-decoration: underline; }

        form { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        input, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--neon); }
        button { background: var(--neon); color: #0a0a0f; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; width: 100%; }
        button:hover { opacity: 0.9; }

        footer { background: var(--surface); border-top: 1px solid var(--border); padding: 32px 2rem; text-align: center; margin-top: 120px; font-size: 0.85rem; color: var(--muted); }
        footer a { color: var(--muted); text-decoration: none; margin: 0 10px; transition: color 0.2s; }
        footer a:hover { color: var(--neon); }
        @media (max-width: 768px) { nav { display: none; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-inner">
            <a href="/" class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <span class="logo-text">VORTE<span>XLY</span></span>
            </a>
            <nav>
                <a href="/">Home</a>
                <a href="/about.html">About</a>
                <a href="/contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>CONTACT <span>US</span></h1>
        <p class="subtitle">Have questions, feedback, or a game to submit? Get in touch with us!</p>

        <div class="contact-method">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <div class="contact-details">
                <h4>Email Support</h4>
               <p>Drop us a line at: <a href="mailto:manao19871010@gmail.com?subject=Vortexly%20Website%20Inquiry">manao19871010@gmail.com</a></p>
            </div>
        </div>

        <form onsubmit="event.preventDefault(); alert('Message sent simulated!');">
            <div class="form-group">
                <label>Name</label>
                <input type="text" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Your email" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>© 2026 Vortexly. All rights reserved. | <a href="/about.html">About Us</a> | <a href="/privacy.html">Privacy Policy</a></p>
    </footer>
</body>
</html>
